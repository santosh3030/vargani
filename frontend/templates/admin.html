<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="Admin Dashboard - Rambaugchi Matarani 2026 Rambaugchi Matarani Vargani. Manage flats, payments, and owner details.">
  <title>Admin Panel | Rambaugchi Matarani 2026</title>
  <link rel="stylesheet" href="/static/css/style.css">

</head>
<body>
  <!-- Background Animation -->
  <div class="bg-animation">
    <div class="orb"></div>
    <div class="orb"></div>
    <div class="orb"></div>
  </div>

  <!-- Mobile Toggle -->
  <button class="mobile-toggle" id="mobileToggle">☰</button>
  <div class="sidebar-overlay" id="sidebarOverlay"></div>

  <div class="dashboard">
    <!-- Sidebar -->
    <aside class="sidebar" id="sidebar">
      <div class="sidebar-header">
        <div style="display: flex; align-items: center; gap: 10px; margin-bottom: 5px;">
           <img src="/static/images/logo.png" alt="Logo" style="width: 40px; height: 40px; object-fit: contain;" onerror="this.outerHTML='<h2 style=\'margin:0;\'>🏢</h2>'">
           <h2 style="margin:0; font-size: 1.2rem;">RAMBAUGCHI MATARANI</h2>
        </div>
        <span class="role-badge admin">Admin</span>
      </div>

      <nav class="sidebar-nav">
        <button class="nav-item active" data-section="dashboardSection">
          <span class="nav-icon">📊</span> Dashboard
        </button>
        <button class="nav-item" data-section="buildingSection">
          <span class="nav-icon">🏗️</span> Building View
        </button>
        <button class="nav-item" data-section="karykartaSection">
          <span class="nav-icon">👔</span> Karykartas
        </button>
        <button class="nav-item" data-section="bhandaraSection">
          <span class="nav-icon">🌾</span> Bhandara
        </button>
        <button class="nav-item" data-section="journeySection">
          <span class="nav-icon">📅</span> Journey 2010-25
        </button>
      </nav>

      <div class="sidebar-footer">
        <button class="nav-item" id="logoutBtn" style="color:var(--danger);">
          <span class="nav-icon">🚪</span> Logout
        </button>
      </div>
    </aside>

    <!-- Main Content -->
    <main class="main-content">
      <!-- Top Bar -->
      <div class="top-bar">
        <h1>Dashboard</h1>
        <div style="display:flex; align-items:center; gap: 15px;">
           <label for="logoUpload" class="btn" style="cursor:pointer; display:inline-block; padding:8px 15px; border-radius:6px; font-size:14px; background:var(--accent-primary); color:white; border:none; font-weight:600;">Update Logo</label>
           <input type="file" id="logoUpload" accept="image/*" style="display:none;">
           <div class="search-box">
             <span class="search-icon">🔍</span>
             <input type="text" id="searchInput" placeholder="Search by flat no or owner name...">
           </div>
        </div>
      </div>

      <!-- Stats -->
      <div class="stats-grid" id="statsGrid">
        <!-- Rendered by JS -->
      </div>

      <!-- Building Section -->
      <div class="building-section">
        <div class="section-header">
          <h2>🏢 Building Overview</h2>
          <div class="floor-tabs" id="floorTabs">
            <!-- Rendered by JS -->
          </div>
        </div>
        <div id="buildingContainer">
          <!-- Rendered by JS -->
        </div>
      </div>

      <!-- Karykarta Section -->
      <div class="karykarta-section content-section" id="karykartaSection" style="display:none;">
        <div class="section-header" style="display: flex; justify-content: space-between; align-items: center;">
          <h2>👔 Karykartas</h2>
          <button class="btn btn-primary" id="addKarykartaBtn">➕ Add Member</button>
        </div>
        <div class="karykarta-grid" id="karykartaContainer" style="display: grid; grid-template-columns: repeat(auto-fill, minmax(250px, 7fr)); gap: 20px; margin-top: 20px;">
          <!-- Rendered by JS -->
        </div>
      </div>

      <!-- Bhandara Section -->
      <div class="bhandara-section content-section" id="bhandaraSection" style="display:none;">
        <div class="section-header" style="display: flex; justify-content: space-between; align-items: center;">
          <h2>🌾 Bhandara Donations</h2>
          <button class="btn btn-primary" id="addBhandaraBtn">➕ Add Donation</button>
        </div>
        <div id="bhandaraContainer" style="display: flex; flex-direction: column; gap: 15px; margin-top: 20px;">
          <!-- Rendered by JS -->
        </div>
      </div>

      <!-- Journey Section -->
      <div class="journey-section content-section" id="journeySection" style="display:none;">
        <div class="section-header">
          <h2>📅 Journey 2010-2025</h2>
          <p style="color:var(--text-secondary); margin-top:5px; font-size:0.9rem;">Click on a year to upload/update its image.</p>
        </div>
        <div id="journeyContainer" style="display: grid; grid-template-columns: repeat(auto-fill, minmax(200px, 1fr)); gap: 20px; margin-top: 20px;">
          <!-- Rendered by JS -->
        </div>
      </div>

      <footer style="margin-top: 40px; text-align: center; color: var(--text-muted); font-size: 0.85rem;">
        <strong>Tech Stack:</strong> Frontend (HTML5, CSS3, Vanilla JS) | Backend (Python Flask &amp; SQLite DB)
      </footer>
    </main>
  </div>

  <!-- Edit Flat Modal -->
  <div class="modal-overlay" id="editModal">
    <div class="modal">
      <div class="modal-header">
        <h3>
          ✏️ Edit Flat <span id="editFlatNo" style="color:var(--accent-primary-light);"></span>
          <span id="editFloor" style="font-size:0.85rem; color:var(--text-muted); font-weight:400; margin-left:8px;"></span>
        </h3>
        <button class="modal-close" id="modalClose">✕</button>
      </div>

      <div id="editForm">
        <div class="form-group">
          <label for="editOwnerName">Owner Name</label>
          <input type="text" id="editOwnerName" placeholder="Enter owner name">
        </div>
        
        <div class="form-group">
          <label for="editBhandara">Bhandara Items (Grocery Donation)</label>
          <input type="text" id="editBhandara" placeholder="e.g. 5kg Rice, 2L Oil">
        </div>

        <div class="form-group">
          <label>Payment Status</label>
          <div class="status-toggle">
            <button type="button" class="status-option paid-opt" id="statusPaid">✅ Paid</button>
            <button type="button" class="status-option unpaid-opt" id="statusUnpaid">❌ Unpaid</button>
          </div>
        </div>

        <div id="paymentFields" style="display:none;">
          <div class="form-group">
            <label for="editAmount">Amount (₹)</label>
            <input type="number" id="editAmount" placeholder="Enter amount paid" min="0">
          </div>
          <div class="form-group">
            <label for="editPaymentDate">Payment Date</label>
            <input type="date" id="editPaymentDate">
          </div>
          <div class="form-group">
            <label for="editReceivedBy">Received By</label>
            <input type="text" id="editReceivedBy" placeholder="Enter name of person who received the money">
          </div>
        </div>

        <div class="form-actions">
          <button class="btn btn-secondary" id="cancelEdit">Cancel</button>
          <button class="btn btn-success" id="saveEdit">💾 Save Changes</button>
        </div>
      </div>
    </div>
  </div>

  <!-- Add Karykarta Modal -->
  <div class="modal-overlay" id="addKarykartaModal">
    <div class="modal">
      <div class="modal-header">
        <h3>➕ Add Karykarta</h3>
        <button class="modal-close" id="karykartaModalClose">✕</button>
      </div>

      <form id="addKarykartaForm">
        <div class="form-group">
          <label>Passport Photo (Optional)</label>
          <div style="display: flex; gap: 15px; align-items: center;">
            <div id="photoPreview" style="width: 80px; height: 100px; background: var(--bg-primary); border: 2px dashed var(--border-color); border-radius: 8px; overflow: hidden; display: flex; align-items: center; justify-content: center;">
              <span style="font-size: 2rem; color: var(--text-muted);">📷</span>
            </div>
            <input type="file" id="karykartaPhoto" accept="image/*" style="font-size: 0.9rem;">
          </div>
        </div>
        
        <div class="form-group">
          <label for="karykartaName">Name *</label>
          <input type="text" id="karykartaName" required placeholder="Enter full name">
        </div>

        <div class="form-group">
          <label for="karykartaPosition">Position *</label>
          <input type="text" id="karykartaPosition" required placeholder="e.g. President, Secretary">
        </div>

        <div class="form-group">
          <label for="karykartaFlat">Flat Number (Optional)</label>
          <input type="text" id="karykartaFlat" placeholder="e.g. 101">
        </div>

        <div class="form-group">
          <label for="karykartaDetails">Responsibilities / Details</label>
          <textarea id="karykartaDetails" rows="3" placeholder="Additional info..."></textarea>
        </div>

        <div class="form-actions">
          <button type="button" class="btn btn-secondary" id="cancelKarykarta">Cancel</button>
          <button type="submit" class="btn btn-primary">💾 Save Member</button>
        </div>
      </form>
    </div>
  </div>

  <!-- Add Bhandara Modal -->
  <div class="modal-overlay" id="addBhandaraModal">
    <div class="modal">
      <div class="modal-header">
        <h3>➕ Add Donation</h3>
        <button class="modal-close" id="bhandaraModalClose">✕</button>
      </div>

      <form id="addBhandaraForm">
        <div class="form-group">
          <label for="bhandaraFlatNo">Select Flat *</label>
          <select id="bhandaraFlatNo" required style="width:100%; padding:10px; border-radius:6px; border:1px solid var(--border-color); background:var(--bg-secondary); color:var(--text-primary); font-size:1rem; margin-top:5px;">
            <option value="">Select a flat...</option>
            <!-- Rendered by JS -->
          </select>
        </div>
        
        <div class="form-group">
          <label for="adminBhandaraItems">Donated Items *</label>
          <input type="text" id="adminBhandaraItems" required placeholder="e.g. 5kg Rice, 2L Oil">
        </div>

        <div class="form-actions">
          <button type="button" class="btn btn-secondary" id="cancelBhandara">Cancel</button>
          <button type="submit" class="btn btn-primary">💾 Save Donation</button>
        </div>
      </form>
    </div>
  </div>

  <script src="/static/js/app.js"></script>
  <script src="/static/js/admin.js"></script>

  <script>
    // Sidebar nav switching
    document.querySelectorAll('.nav-item[data-section]').forEach(item => {
      item.addEventListener('click', () => {
        document.querySelectorAll('.nav-item[data-section]').forEach(n => n.classList.remove('active'));
        item.classList.add('active');

        // Hide all sections, show target
        const targetId = item.getAttribute('data-section');
        document.getElementById('statsGrid').style.display = targetId === 'dashboardSection' ? 'grid' : 'none';
        document.querySelector('.building-section').style.display = targetId === 'buildingSection' || targetId === 'dashboardSection' ? 'block' : 'none';
        document.getElementById('karykartaSection').style.display = targetId === 'karykartaSection' ? 'block' : 'none';
        document.getElementById('bhandaraSection').style.display = targetId === 'bhandaraSection' ? 'block' : 'none';
        document.getElementById('journeySection').style.display = targetId === 'journeySection' ? 'block' : 'none';

        // Update top-bar title
        const topTitle = document.querySelector('.top-bar h1');
        if (targetId === 'dashboardSection') topTitle.textContent = 'Dashboard';
        if (targetId === 'buildingSection') topTitle.textContent = 'Building View';
        if (targetId === 'karykartaSection') topTitle.textContent = 'Karykartas';
        if (targetId === 'bhandaraSection') topTitle.textContent = 'Bhandara Donations';
        if (targetId === 'journeySection') topTitle.textContent = 'Journey 2010-2025';

        // Close mobile sidebar
        document.getElementById('sidebar').classList.remove('open');
        document.getElementById('sidebarOverlay').classList.remove('show');
      });
    });
  </script>
</body>
</html>
